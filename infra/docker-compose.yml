name: evivi

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: evivi-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: http://localhost:8082,http://localhost:19006,http://localhost:3000
      DATABASE_URL: postgresql://evivi:evivi_dev_password@postgres:5432/evivi?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ISSUER: ""
      PAYSTACK_SECRET_KEY: ""
      PAYSTACK_WEBHOOK_SECRET: ""
      OZOW_SITE_CODE: ""
      OZOW_PRIVATE_KEY: ""
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: evivi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evivi
      POSTGRES_USER: evivi
      POSTGRES_PASSWORD: evivi_dev_password
    ports:
      - "5432:5432"
    volumes:
      - evivi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evivi -d evivi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evivi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: evivi-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@evivi.local
      PGADMIN_DEFAULT_PASSWORD: evivi_admin_password
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    container_name: evivi-redisinsight
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  evivi-postgres-data:
